<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0B0B0B"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#232323" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#232323" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#232323" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#232323" stroke-width="1"/>

  <!-- Accent line left -->
  <rect x="80" y="180" width="2" height="270" fill="#D7D2C8" opacity="0.3"/>

  <!-- Monogram block top-left -->
  <rect x="80" y="80" width="52" height="52" fill="#141414" rx="0"/>
  <text x="106" y="115" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" fill="#F5F5F5" text-anchor="middle" letter-spacing="1">SB</text>

  <!-- Name -->
  <text x="106" y="248" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="400" fill="#8B8B8B" text-anchor="middle" letter-spacing="3">SANKET BHOR</text>

  <!-- Main headline -->
  <text x="160" y="320" font-family="system-ui,-apple-system,sans-serif" font-size="68" font-weight="700" fill="#F5F5F5" letter-spacing="-2">Senior</text>
  <text x="160" y="398" font-family="system-ui,-apple-system,sans-serif" font-size="68" font-weight="700" fill="#F5F5F5" letter-spacing="-2">Engineer</text>

  <!-- Divider -->
  <rect x="160" y="426" width="48" height="1" fill="#D7D2C8" opacity="0.4"/>

  <!-- Sub-line: specialisation, not role -->
  <text x="160" y="468" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="300" fill="#8B8B8B" letter-spacing="0.5">Angular · Accessibility · Performance · Navi Mumbai</text>

  <!-- Domain badge -->
  <rect x="960" y="555" width="160" height="32" fill="#141414" rx="0"/>
  <text x="1040" y="576" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="500" fill="#D7D2C8" text-anchor="middle" letter-spacing="1">sanketbhor.dev</text>
</svg>
